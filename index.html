pages['matt-tsreset'] = `# ts-reset 设计哲学

> **GitHub**: \`mattpocock/ts-reset\` | ⭐ 8,489

## 解决什么问题

TypeScript 标准库的类型定义在某些场景下过于保守——导致开发者不得不写大量类型断言。

比如 \`Array.filter(Boolean)\` 返回的类型是 \`(T | undefined)[]\` 而非 \`T[]\`。

## 核心改进

\`\`\`typescript
// 引入 ts-reset 前
const result = [1, undefined, 3].filter(Boolean)
// result: (number | undefined)[] ❌

// 引入 ts-reset 后
import '@total-typescript/ts-reset'
const result = [1, undefined, 3].filter(Boolean)
// result: number[] ✅
\`\`\`

## 设计原则

1. **只修正错误，不添加新语法** — 不引入新概念
2. **零运行时开销** — 纯类型层面修改
3. **渐进式采用** — 按需 import，不影响现有代码
4. **TypeScript 团队认可的规范** — 不胡改，只改"明显是 bug"的部分
`;

  'https://api.example.com/user/1',
  z.object({ id: z.number(), name: z.string() })
)
// user 的类型自动为 { id: number; name: string }
\`\`\`

## 设计哲学

### 最小 API
整个库只有一个函数 \`createFetcher\`。API surface 越小，学习成本越低。

### Zod 作为类型源头
不是定义类型再写 Zod schema——Zod schema 就是类型源头。\`z.infer\` 自动推导。

### 错误处理
\`\`\`typescript
// 解析失败时抛出结构化错误
try {
  const data = await fetcher(url, schema)
} catch (e) {
  if (e instanceof ZodError) {
    console.error('数据格式异常:', e.issues)
  }
}
\`\`\`

## 一、工程组织

### 技能即代码
将工程判断编码为可复用的规则文件，让 AI 代理也能遵循最佳实践。

用 monorepo 管理多个工具（total-typescript-monorepo），统一 lint、test、build。

## 二、TypeScript 风格

### 类型安全，但求实用
- 用 Zod 替代手写类型
- 修正标准库错误（ts-reset）
- 错误信息要对人类友好（ts-error-translator）

### 泛型要克制
\`\`\`typescript
// 好：精确约束
function process<T extends { id: string }>(item: T)

// 不好：过度泛化
function process<T>(item: T & { id: string })

// ===== 导航与渲染 =====
const content = document.getElementById('content-inner');

function navigate(page) {
  // 更新导航高亮
  document.querySelectorAll('.nav-item, .nav-section-title[onclick]').forEach(el => {
    el.classList.remove('active');
  });
  
  // 如果是 nav-item，高亮它
  const activeEl = document.querySelector(`[onclick="navigate('${page}')"]`);
  if (activeEl) activeEl.classList.add('active');

  // 渲染页面
  const md = pages[page] || '# 404\n页面不存在。';
  content.innerHTML = marked.parse(md);
  
  // 代码高亮
  content.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  // 滚动到顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  // 更新 URL hash
  history.pushState(null, '', '#' + page);
}

// 从 hash 恢复导航
function loadFromHash() {
  const hash = location.hash.slice(1) || 'home';
  navigate(hash);
}

window.addEventListener('hashchange', loadFromHash);
loadFromHash();
</script>
